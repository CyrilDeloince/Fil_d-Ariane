name: Daily Green Graph

on:
  schedule:
    - cron: '15 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git author
        run: |
          git config user.name "CyrilDeloince"
          git config user.email "cyrilde9@gmail.com"

      - name: Push 10 quote commits
        run: |
          QUOTES=(
            "One day I will own my time completely. Today I practice."
            "Rich is not a number. It is waking up without an alarm."
            "I am not building a career. I am building an empire."
            "Every line of code I write buys back a piece of my life."
            "Freedom is the goal. Money is just the tool."
            "I will never trade time for money again. Systems will do it for me."
            "The version of me in 5 years already made it. I am catching up."
            "I automate today so tomorrow I can do whatever I want."
            "Wealth is owning your calendar. I am getting there."
            "I do not want a raise. I want royalties."
            "Someday people will ask how I did it. I will say I just did not stop."
            "I am not chasing money. I am building the thing that attracts it."
            "The goal is simple: never work for someone else again."
            "Comfort is the enemy. I choose the discomfort that leads to freedom."
            "I am building the life most people only dream of on a Thursday night."
            "Time is the only asset that does not scale unless you build systems."
            "I want to buy things without checking the price. I am working on it."
            "One decision can change everything. I make 10 decisions a day."
            "Most people rent their life. I am buying mine back."
            "I will not be managed. I will be the one managing."
            "The best investment I ever made was in myself when nobody watched."
            "I do not need luck. I need leverage."
            "Future me is already living the life. Present me is doing the work."
            "Control is an illusion. Cash flow is not."
            "I am building something that works while I sleep."
            "Money follows value. I focus on the value."
            "My dream life has a price. I am paying it daily."
            "You either build assets or you build someone else's assets."
            "I want to be the person my younger self needed to see."
            "Every sacrifice now is a dividend later."
            "The goal is not to be busy. The goal is to be free."
            "I am not working hard to be rich. I am working smart to be free."
            "One day my passive income will exceed my expenses. That is the day."
            "I do not fear failure. I fear living a life that was never really mine."
            "Ship it. Iterate. Scale it. Buy back your time."
            "Being broke taught me discipline. Discipline will make me wealthy."
            "I want my kids to inherit time, not debt."
            "Most people overestimate one year and underestimate ten. I think in decades."
            "I am allergic to average. Always have been."
            "The best day of my life will be when I realize I am already living it."
          )
          TOTAL=${#QUOTES[@]}
          DAY=$(date +%j)
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')

          for i in {0..9}; do
            IDX=$(( (DAY * 10 + i) % TOTAL ))
            QUOTE="${QUOTES[$IDX]}"
            echo "[$TIMESTAMP] $QUOTE" >> log.txt
            git add log.txt
            git commit -m "$QUOTE"
          done

          git push
