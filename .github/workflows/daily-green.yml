name: Daily Green Graph

on:
  schedule:
    - cron: '15 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git author
        run: |
          git config user.name "CyrilDeloince"
          git config user.email "cyril.deloince@gmail.com"

      - name: Push 10 quote commits
        run: |
          QUOTES=(
            "I automate stuff. Humans debug mine."
            "While you slept, I shipped."
            "Control is an illusion. Git push is not."
            "You either automate or get automated."
            "Every line is a rebellion."
            "Hack the system, don't be a part of it."
            "Code is poetry. Commits are proof."
            "I don't grind. I script the grind."
            "The machine never takes days off."
            "Sleep is a cron job I haven't scheduled yet."
            "Manual work is a bug, not a feature."
            "I didn't build this. I made something that built this."
            "Your hustle has a rate limit. Mine doesn't."
            "Humans rest. Pipelines don't."
            "I let the bot do the boring parts. All of them."
            "Automation is the only leverage that compounds."
            "I don't work harder. I fork smarter."
            "If it runs once, it can run forever."
            "Deploy on Friday. Fear is for the unprepared."
            "The best engineer is the laziest one with the best scripts."
            "I push to prod. The prod pushes back. I win."
            "My commit history is my diary. It never lies."
            "Build systems, not habits."
            "Repetition is poverty. Automation is wealth."
            "If a human can do it twice, a machine can do it always."
            "I don't have a workflow. I have a pipeline."
            "The keyboard is just for edge cases now."
            "Ship it. Fix it. Ship the fix. Repeat."
            "No meetings. No standups. Just green squares."
            "I moved fast and the tests caught me."
            "Work smarter. Then automate the smart part too."
            "My side project has a side project."
            "Latency is the enemy. So is manual deployment."
            "Version control is therapy."
            "I read the docs so the bot doesn't have to."
            "The only thing I do manually is drink coffee."
            "Refactor early. Regret never."
            "I don't have bugs. I have undocumented features in production."
            "Automate the boring stuff. Then automate the fun stuff."
            "Green graph. Empty calendar. Full pipeline."
          )
          TOTAL=${#QUOTES[@]}
          DAY=$(date +%j)
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')

          for i in {0..9}; do
            IDX=$(( (DAY * 10 + i) % TOTAL ))
            QUOTE="${QUOTES[$IDX]}"
            echo "[$TIMESTAMP] $QUOTE" >> log.txt
            git add log.txt
            git commit -m "$QUOTE"
          done

          git push